
server:
  port: 8053

spring:
  application:
    name: application-service

  datasource:
    url: jdbc:postgresql://localhost:5432/APPLICATION_SERVICE
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use 'validate' in prod
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always   # optional (for schema/data.sql)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: false
    hostname: localhost
    
    
    
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        
        
logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
